name: Security

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

jobs:
  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run pip-audit
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit -r requirements.txt
          pip-audit
